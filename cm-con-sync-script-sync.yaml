    #!/usr/bin/env python3
    import json
    import os
    import sys
    import logging
    from pathlib import Path
    import traceback

    # Setup structured logging for Loki (same as worker.py)
    def setup_logger():
        logger = logging.getLogger("bucket-sync-init")
        logger.setLevel(logging.INFO)
        
        # Create a JSON formatter for Loki
        class JsonFormatter(logging.Formatter):
            def format(self, record):
                log_record = {
                    "time": self.formatTime(record),
                    "level": record.levelname,
                    "message": record.getMessage(),
                    "component": "init-queue"
                }
                
                # Add extra fields from record
                for key, value in record.__dict__.items():
                    if key not in ['args', 'asctime', 'created', 'exc_info', 'exc_text', 
                                  'filename', 'funcName', 'id', 'levelname', 'levelno',
                                  'lineno', 'module', 'msecs', 'message', 'msg', 'name', 
                                  'pathname', 'process', 'processName', 'relativeCreated', 
                                  'stack_info', 'thread', 'threadName']:
                        log_record[key] = value
                    
                return json.dumps(log_record)
        
        # Configure handler to stdout (for Promtail to pick up)
        handler = logging.StreamHandler(sys.stdout)
        handler.setFormatter(JsonFormatter())
        logger.addHandler(handler)
        
        return logger

    logger = setup_logger()

    def main():
        logger.info("Queue initializer starting")
        
        queue_dir = Path('/queue')
        queue_dir.mkdir(exist_ok=True)
        
        # Get environment variables
        pod_index = int(os.environ.get("POD_INDEX", "0"))
        total_pods = int(os.environ.get("TOTAL_PODS", "1"))
        
        logger.info(f"Pod index: {pod_index}, Total pods: {total_pods}", 
                    extra={"pod_index": pod_index, "total_pods": total_pods})

        # Load bucket pairs from config
        config_path = Path('/etc/bucket-config/bucket-pairs.json')
        try:
            with open(config_path) as f:
                bucket_pairs = json.load(f)
                
            logger.info(f"Loaded {len(bucket_pairs)} bucket pairs from config", 
                        extra={"bucket_pairs_count": len(bucket_pairs)})
            
            # Divide bucket pairs among pods
            pod_pairs = []
            for i, pair in enumerate(bucket_pairs):
                if i % total_pods == pod_index:
                    pod_pairs.append(pair)
                    
            logger.info(f"This pod will process {len(pod_pairs)} bucket pairs", 
                        extra={"assigned_pairs_count": len(pod_pairs), "pod_index": pod_index})
            
            # Create work items
            for i, pair in enumerate(pod_pairs):
                item_path = queue_dir / f"item_{i}.json"
                with open(item_path, 'w') as f:
                    json.dump(pair, f)
                logger.info(f"Created work item: {item_path.name}", 
                            extra={
                                "item_file": item_path.name,
                                "source_bucket": pair.get("sourceBucket", "unknown"),
                                "dest_bucket": pair.get("destBucket", "unknown"),
                                "source_region": pair.get("sourceRegion", "unknown"),
                                "dest_region": pair.get("destRegion", "unknown")
                            })
                
            logger.info("Queue initialization complete", 
                        extra={"status": "success", "pod_index": pod_index})
            
        except Exception as e:
            logger.error(f"Error initializing queue: {str(e)}", 
                         extra={"status": "failed", "error": str(e), "pod_index": pod_index})
            logger.error(traceback.format_exc())
            sys.exit(1)

    if __name__ == "__main__":
        main()
